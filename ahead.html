<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#08060f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Time Ahead</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple: #b57bee;
      --purple-dim: #7a4fa3;
      --purple-glow: rgba(181, 123, 238, 0.25);
      --cyan: #7ee8f0;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f87171;
      --gray: #666;
      --bg: #08060f;
      --surface: #0e0b1a;
      --border: rgba(181, 123, 238, 0.18);
      --text: #e8dff5;
      --muted: #5a4d72;
    }

    body {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 20px) 20px calc(env(safe-area-inset-bottom, 20px) + 20px);
      overflow-y: auto;
      position: relative;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
      z-index: 10;
    }

    body::after {
      content: '';
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(100, 40, 160, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 380px;
      margin: 0 auto;
    }

    /* Nav tabs */
    .nav {
      display: flex;
      gap: 2px;
      margin-bottom: 32px;
      margin-top: 20px;
    }

    .nav-tab {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 12px 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s;
    }

    .nav-tab:first-child { border-radius: 4px 0 0 4px; }
    .nav-tab:last-child { border-radius: 0 4px 4px 0; }

    .nav-tab.active {
      background: rgba(181, 123, 238, 0.1);
      color: var(--purple);
      border-color: var(--purple-dim);
    }

    /* Sections */
    .section { display: none; }
    .section.active { display: block; }

    /* Shared card style */
    .card {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px 24px 24px;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--purple);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .card-inner { position: relative; }
    .card-inner::before, .card-inner::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--purple);
      border-style: solid;
    }
    .card-inner::before { top: -29px; right: -25px; border-width: 2px 2px 0 0; }
    .card-inner::after { bottom: -25px; left: -25px; border-width: 0 0 2px 2px; }

    .card-label {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--purple-dim);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 16px;
    }

    /* ---- TIME AHEAD SECTION ---- */
    .now-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: center;
    }

    .now-time {
      font-family: 'Orbitron', monospace;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      color: var(--text);
      text-shadow: 0 0 20px var(--purple-glow), 0 0 60px rgba(181,123,238,0.1);
      text-align: center;
    }

    .now-ampm {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      font-weight: 400;
      color: var(--purple-dim);
      margin-left: 8px;
      letter-spacing: 2px;
    }

    .between-word {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      text-align: center;
    }

    .range-times {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--purple);
      letter-spacing: 1px;
      text-shadow: 0 0 20px var(--purple-glow), 0 0 40px rgba(181,123,238,0.15);
      line-height: 1.3;
      text-align: center;
    }

    .range-ampm {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .range-sep { color: var(--muted); margin: 0 8px; font-size: 20px; }

    .day-note {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--cyan);
      text-transform: uppercase;
      margin-top: 16px;
      opacity: 0.7;
      text-align: center;
    }

    /* ---- SLEEP SECTION ---- */

    /* Wake time picker */
    .wake-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .wake-picker-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .wake-time-input {
      background: rgba(181, 123, 238, 0.08);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--purple);
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
      padding: 8px 12px;
      text-align: center;
      width: 140px;
      outline: none;
    }

    .wake-time-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 12px var(--purple-glow);
    }

    /* Ring */
    .ring-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 20px;
    }

    .ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg { fill: none; stroke: #1a1a2e; stroke-width: 14; }
    .ring-progress {
      fill: none;
      stroke-width: 14;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s ease, stroke 0.5s;
    }

    .ring-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .ring-hours {
      font-family: 'Orbitron', monospace;
      font-size: 36px;
      font-weight: 700;
      text-shadow: 0 0 20px var(--purple-glow);
    }

    .ring-minutes {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 400;
      opacity: 0.7;
    }

    .ring-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Quality badge */
    .quality-badge {
      text-align: center;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .badge-green  { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
    .badge-yellow { background: rgba(250,204,21,0.1); color: var(--yellow); border: 1px solid rgba(250,204,21,0.3); }
    .badge-red    { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
    .badge-gray   { background: rgba(102,102,102,0.1); color: var(--gray); border: 1px solid rgba(102,102,102,0.3); }

    /* Legend */
    .legend {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    /* Science section */
    .science-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      background: var(--surface);
      margin-top: 16px;
    }

    .science-title {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--purple-dim);
      text-transform: uppercase;
      margin-bottom: 16px;
      text-align: center;
    }

    .science-item {
      margin-bottom: 14px;
    }

    .science-item:last-child { margin-bottom: 0; }

    .science-label {
      font-size: 10px;
      color: var(--cyan);
      letter-spacing: 1px;
      margin-bottom: 4px;
      opacity: 0.8;
    }

    .science-value {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      opacity: 0.75;
    }

    .cycle-times {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .cycle-chip {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .cycle-chip.optimal {
      border-color: rgba(74,222,128,0.4);
      color: var(--green);
      background: rgba(74,222,128,0.06);
    }

    /* Spacer */
    .spacer { margin-top: 28px; }

    /* Footer dots */
    .footer {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 8px;
      opacity: 0.3;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--purple-dim);
      animation: blink 2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.4s; }
    .dot:nth-child(3) { animation-delay: 0.8s; }

    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="content">

    <!-- Nav -->
    <div class="nav" id="nav">
      <div class="nav-tab active" data-tab="ahead">Time Ahead</div>
      <div class="nav-tab" data-tab="sleep">Sleep</div>
    </div>

    <!-- ===== TIME AHEAD ===== -->
    <div class="section active" id="sec-ahead">
      <div class="now-label">Current Time</div>
      <div class="now-time" id="now-time"></div>

      <div class="spacer"></div>

      <div class="card">
        <div class="card-inner">
          <div class="card-label">8 - 12 Hours From Now</div>
          <div class="between-word">Between</div>
          <div class="range-times" id="range-times"></div>
          <div class="day-note" id="day-note"></div>
        </div>
      </div>
    </div>

    <!-- ===== SLEEP COUNTDOWN ===== -->
    <div class="section" id="sec-sleep">

      <div class="card">
        <div class="card-inner">
          <div class="card-label">Wake-Up Countdown</div>

          <div class="wake-picker">
            <span class="wake-picker-label">Wake at</span>
            <input type="time" id="wake-input" class="wake-time-input" value="06:30">
          </div>

          <div class="quality-badge" id="quality-badge"></div>

          <div class="ring-wrap">
            <svg class="ring-svg" viewBox="0 0 200 200">
              <circle class="ring-bg" cx="100" cy="100" r="85"/>
              <circle class="ring-progress" id="ring-progress" cx="100" cy="100" r="85"/>
            </svg>
            <div class="ring-center">
              <div class="ring-hours" id="ring-hours"></div>
              <div class="ring-minutes" id="ring-minutes"></div>
              <div class="ring-label" id="ring-label"></div>
            </div>
          </div>

          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> 8-10h</div>
            <div class="legend-item"><div class="legend-dot" style="background:#facc15"></div> 7-8h</div>
            <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div> 5-7h</div>
            <div class="legend-item"><div class="legend-dot" style="background:#666"></div> &lt;5h</div>
          </div>
        </div>
      </div>

      <!-- Science recs -->
      <div class="science-card" id="science-card">
        <div class="science-title">Sleep Science</div>
        <div id="science-content"></div>
      </div>
    </div>

    <div class="footer">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    // ---- State ----
    let wakeHour = 6, wakeMin = 30;
    const saved = localStorage.getItem('wakeTime');
    if (saved) {
      const [h, m] = saved.split(':').map(Number);
      if (!isNaN(h) && !isNaN(m)) { wakeHour = h; wakeMin = m; }
    }

    // URL param override: ?wake=07:00 or ?mode=sleep or ?mode=ahead
    const params = new URLSearchParams(location.search);
    const paramWake = params.get('wake');
    if (paramWake) {
      const [h, m] = paramWake.split(':').map(Number);
      if (!isNaN(h) && !isNaN(m)) { wakeHour = h; wakeMin = m; }
    }

    document.getElementById('wake-input').value =
      String(wakeHour).padStart(2,'0') + ':' + String(wakeMin).padStart(2,'0');

    // ---- Tabs ----
    const tabs = document.querySelectorAll('.nav-tab');
    const sections = { ahead: document.getElementById('sec-ahead'), sleep: document.getElementById('sec-sleep') };

    function switchTab(name) {
      tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      Object.entries(sections).forEach(([k, el]) => el.classList.toggle('active', k === name));
    }

    tabs.forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

    // Check URL mode - query param OR filename
    const mode = params.get('mode')
      || (location.pathname.includes('sleep') ? 'sleep' : null)
      || (location.pathname.includes('ahead') ? 'ahead' : null);
    if (mode === 'sleep') switchTab('sleep');
    if (mode === 'ahead') switchTab('ahead');

    // ---- Wake input ----
    document.getElementById('wake-input').addEventListener('change', e => {
      const [h, m] = e.target.value.split(':').map(Number);
      if (!isNaN(h) && !isNaN(m)) {
        wakeHour = h; wakeMin = m;
        localStorage.setItem('wakeTime', e.target.value);
        updateSleep();
      }
    });

    // ---- Time Ahead ----
    function fmtTime(date) {
      let h = date.getHours();
      const m = date.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return { str: `${h}:${String(m).padStart(2,'0')}`, ampm };
    }

    function dayLabel(now, future) {
      const a = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const b = new Date(future.getFullYear(), future.getMonth(), future.getDate());
      const diff = (b - a) / 86400000;
      if (diff === 0) return null;
      if (diff === 1) return 'Tomorrow';
      return future.toLocaleDateString('en-US', { weekday: 'long' });
    }

    function updateAhead() {
      const now = new Date();
      const early = new Date(now.getTime() + 8 * 3600000);
      const late  = new Date(now.getTime() + 12 * 3600000);

      const nt = fmtTime(now);
      document.getElementById('now-time').innerHTML =
        `${nt.str}<span class="now-ampm">${nt.ampm}</span>`;

      const et = fmtTime(early), lt = fmtTime(late);
      document.getElementById('range-times').innerHTML =
        `${et.str} <span class="range-ampm">${et.ampm}</span>` +
        `<span class="range-sep">&mdash;</span>` +
        `${lt.str} <span class="range-ampm">${lt.ampm}</span>`;

      const ed = dayLabel(now, early), ld = dayLabel(now, late);
      const note = document.getElementById('day-note');
      if (!ed && !ld) note.textContent = '';
      else if (ed === ld) note.textContent = ed || '';
      else note.textContent = `${ed || 'Today'} → ${ld}`;
    }

    // ---- Sleep Countdown ----
    function getMinutesUntilWake() {
      const now = new Date();
      const target = new Date(now);
      target.setHours(wakeHour, wakeMin, 0, 0);
      if (target <= now) target.setDate(target.getDate() + 1);
      return (target - now) / 60000;
    }

    function getQuality(hours) {
      if (hours >= 8 && hours <= 10) return { level: 'Optimal', cls: 'badge-green', color: '#4ade80' };
      if (hours > 10)               return { level: 'Optimal', cls: 'badge-green', color: '#4ade80' };
      if (hours >= 7)               return { level: 'Acceptable', cls: 'badge-yellow', color: '#facc15' };
      if (hours >= 5)               return { level: 'Insufficient', cls: 'badge-red', color: '#f87171' };
      if (hours >= 3)               return { level: 'Critical', cls: 'badge-gray', color: '#666' };
      return { level: 'Dangerous', cls: 'badge-gray', color: '#666' };
    }

    function fmtWakeLabel() {
      let h = wakeHour, ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${String(wakeMin).padStart(2,'0')} ${ampm}`;
    }

    function getSleepCycles() {
      // 90-min cycles + 15 min to fall asleep
      const cycles = [];
      for (let c = 6; c >= 3; c--) {
        const totalMin = c * 90 + 15;
        const now = new Date();
        const target = new Date(now);
        target.setHours(wakeHour, wakeMin, 0, 0);
        if (target <= now) target.setDate(target.getDate() + 1);
        const bedtime = new Date(target.getTime() - totalMin * 60000);
        const bt = fmtTime(bedtime);
        cycles.push({
          count: c,
          hours: (c * 90 / 60).toFixed(1),
          bedtime: `${bt.str} ${bt.ampm}`,
          optimal: c >= 5
        });
      }
      return cycles;
    }

    function updateSleep() {
      const totalMin = getMinutesUntilWake();
      const hours = Math.floor(totalMin / 60);
      const minutes = Math.floor(totalMin % 60);
      const totalHours = totalMin / 60;
      const quality = getQuality(totalHours);

      // Badge
      document.getElementById('quality-badge').innerHTML =
        `<span class="badge ${quality.cls}">${quality.level} Sleep Window</span>`;

      // Ring
      const circumference = 2 * Math.PI * 85;
      const fraction = Math.min(totalHours / 9, 1);
      const offset = circumference * (1 - fraction);
      const ring = document.getElementById('ring-progress');
      ring.setAttribute('stroke', quality.color);
      ring.setAttribute('stroke-dasharray', circumference);
      ring.setAttribute('stroke-dashoffset', offset);

      // Center text
      document.getElementById('ring-hours').textContent = `${hours}h`;
      document.getElementById('ring-minutes').textContent = `${minutes}m`;
      document.getElementById('ring-label').textContent = `until ${fmtWakeLabel()}`;

      // Science content
      const cycles = getSleepCycles();
      let sciHTML = '';

      // Recommended duration
      sciHTML += `<div class="science-item">
        <div class="science-label">▸ Recommended Duration</div>
        <div class="science-value">Adults need 7-9 hours per night. Consistently getting less than 7 hours increases risk of cardiovascular disease, weakened immunity, and impaired cognition. (AASM / Sleep Research Society)</div>
      </div>`;

      // Sleep cycles
      sciHTML += `<div class="science-item">
        <div class="science-label">▸ Ideal Bedtimes (90-min cycles)</div>
        <div class="science-value">Each sleep cycle lasts ~90 minutes. Waking between cycles feels more refreshing. To wake at ${fmtWakeLabel()}, fall asleep by:</div>
        <div class="cycle-times">`;
      cycles.forEach(c => {
        sciHTML += `<div class="cycle-chip ${c.optimal ? 'optimal' : ''}">${c.bedtime} <span style="opacity:0.5">(${c.hours}h)</span></div>`;
      });
      sciHTML += `</div></div>`;

      // Tips
      sciHTML += `<div class="science-item">
        <div class="science-label">▸ Evidence-Based Tips</div>
        <div class="science-value">
          • Keep your room at 65-68°F (18-20°C) for optimal sleep<br>
          • Stop screens 30-60 min before bed (blue light suppresses melatonin by up to 50%)<br>
          • Consistent wake time matters more than consistent bedtime<br>
          • Caffeine has a 6-hour half-life, so avoid it after early afternoon<br>
          • Even 10 min of morning sunlight resets your circadian clock
        </div>
      </div>`;

      document.getElementById('science-content').innerHTML = sciHTML;
    }

    // ---- Init & Loop ----
    updateAhead();
    updateSleep();
    setInterval(() => { updateAhead(); updateSleep(); }, 1000);

    // ---- Service Worker ----
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
